<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload Document</title>
    <meta charset="UTF-8">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            width: 380px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: 600;
            margin-top: 10px;
            display: block;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76,175,80,0.4);
        }

        .file-name {
            font-size: 13px;
            margin-top: 5px;
            color: #555;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #43a047;
        }

        button:disabled {
            background: #9e9e9e;
            cursor: not-allowed;
        }

        .response {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 14px;
        }

        .error {
            background: #ffebee;
            color: #c62828;
        }
        
        
        
        .download-btn {
    display: block;
    text-align: center;
    margin-top: 10px;
    padding: 10px;
    background: #2196F3;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.3s;
}

.download-btn:hover {
    background: #1976D2;
}



    </style>
</head>

<body>

<div class="card">
    <h2>📄 Upload Document</h2>

    <form action="/documents/upload" method="post" enctype="multipart/form-data" onsubmit="handleSubmit(this)">

        <label>Entity ID</label>
        <input type="text" name="entityId" placeholder="Enter Entity ID" required>

        <label>Tenant ID</label>
        <input type="text" name="tenantId" placeholder="Enter Tenant ID" required>

        <label>Select File</label>
        <input type="file" name="file" id="fileInput" required onchange="showFileName()">
        <div id="fileName" class="file-name"></div>

        <button type="submit" id="uploadBtn">⬆ Upload File</button>
        
        <div class="response" th:if="${response}">
    
    <p><b>Document ID:</b> <span th:text="${response.documentId}"></span></p>

    <a th:href="${response.downloadUrl}" target="_blank">
        <button type="button">⬇ Download File</button>
    </a>

</div>
        
    </form>

    <div class="response" th:if="${message}" th:text="${message}"></div>
</div>

<script>
    function showFileName() {
        const fileInput = document.getElementById("fileInput");
        const fileNameDiv = document.getElementById("fileName");

        if (fileInput.files.length > 0) {
            fileNameDiv.textContent = "Selected: " + fileInput.files[0].name;
        }
    }

    function handleSubmit(form) {
        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;
        btn.textContent = "Uploading... ⏳";
    }
</script>

</body>
</html>
